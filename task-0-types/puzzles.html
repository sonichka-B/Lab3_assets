<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task 1 — Прогнози типізації</title>
</head>
<body>

<h1>Прогнози типізації</h1>
<p>Відкрийте Console (F12) і дивіться результат. Перш ніж запускати —
   передбачте у коментарях, що виведе кожен <code>console.log</code>.</p>

<script>
  // ============================================================
  // ІНСТРУКЦІЯ
  // ============================================================
  // 1. НЕ запускаючи код, передбачте результат кожного виразу.
  // 2. Запишіть прогноз у коментарі поряд (// Прогноз: ...).
  // 3. Поясніть коротко, чому такий результат.
  // 4. Запустіть код і звірте.
  // 5. Де помилились — оновіть пояснення.
  // ============================================================

  console.log(0 == "");                  // Прогноз: ?
  console.log(0 === "");                 // Прогноз: ?
  console.log([] + []);                  // Прогноз: ?
  console.log([] + {});                  // Прогноз: ?
  console.log("5" - 3);                  // Прогноз: ?
  console.log("5" + 3);                  // Прогноз: ?
  console.log(null == undefined);        // Прогноз: ?
  console.log(null === undefined);       // Прогноз: ?
  console.log(true + 1);                 // Прогноз: ?
  console.log(typeof null);              // Прогноз: ?
  console.log(typeof typeof 1);          // Прогноз: ?
  console.log(NaN === NaN);              // Прогноз: ?
</script>

</body>
</html>
